name: vscode-extension-smoke

on:
  push:
    branches:
      - dev
    paths:
      - "packages/kilo-vscode/**"
      - ".github/workflows/vscode-extension-smoke.yml"
  pull_request:
    paths:
      - "packages/kilo-vscode/**"
      - ".github/workflows/vscode-extension-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run --cwd packages/kilo-vscode check-types

      - name: Lint
        run: bun run --cwd packages/kilo-vscode lint

      - name: Unit tests
        run: bun run --cwd packages/kilo-vscode test:unit

      - name: Integration tests
        run: bun run --cwd packages/kilo-vscode test:integration

      - name: Theme contract tests
        run: bun run --cwd packages/kilo-vscode test:themes

      - name: Build package
        run: bun run --cwd packages/kilo-vscode package

      - name: Build local VSIX
        run: bun run --cwd packages/kilo-vscode vsix:local

      - name: Bundle size audit
        run: bun run --cwd packages/kilo-vscode audit:bundle

      - name: Upload VSIX
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kilo-code-local-vsix
          path: packages/kilo-vscode/kilo-code-local.vsix
